name: macOS CI

on:
  pull_request:
    paths:
      - "macos/**"
      - "packages/**"
      - "mise.toml"
      - ".github/workflows/macos-ci.yml"
  push:
    branches:
      - main
    paths:
      - "macos/**"
      - "packages/**"
      - "mise.toml"
      - ".github/workflows/macos-ci.yml"

permissions:
  contents: read

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Xcode version
        run: xcodebuild -version

      # Same commands as local `mise run kit:test` / `mise run macos:test`.
      - name: AtelierCodeKit tests
        run: mise run kit:test

      - name: macOS app tests
        run: mise run macos:test
