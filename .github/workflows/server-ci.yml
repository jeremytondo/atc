name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: server

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: server

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build
