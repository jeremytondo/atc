name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - "mise.toml"
      - ".github/workflows/server-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "mise.toml"
      - ".github/workflows/server-ci.yml"

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: server

      # Same gates as local `mise run check`: gofmt, go vet, Go tests,
      # svelte-check with warnings as errors.
      - name: Check
        run: mise run check

      - name: Build
        run: mise run build
